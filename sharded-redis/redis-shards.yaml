apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: sharded-redis # sharded redis cluster
spec:
  serviceName: "redis"
  replicas: 3
  # selector
  selector:
    matchLabels:
      app: redis
  template:
    metadata:
      labels:
        app: redis
    spec:
      terminationGracePeriodSeconds: 10
      containers:
        - name: redis
          image: redis
          ports:
            - containerPort: 6379
              name: redis
